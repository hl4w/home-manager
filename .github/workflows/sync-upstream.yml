name: Sync Upstream Home Manager

# 必须的权限，否则无法推送回你的 Fork
permissions:
  contents: write

on:
  # 每天 UTC 0 点定时同步
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: master # 你的默认分支

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/nix-community/home-manager.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream/master into your master
        run: |
          git merge upstream/master --no-edit

      - name: Push back to your fork
        run: |
          git push origin master
