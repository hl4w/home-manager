
name: Sync home-manager upstream

# 权限：需要写权限才能 push 回你的 fork
permissions:
  contents: write

on:
  # 定时：每天 UTC 0 点（可改）
  schedule:
    - cron: '0 0 * * *'
  # 允许手动点按钮触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master  # 你的分支名

      - name: Configure Git identity
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/nix-community/home-manager.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream/master into your master
        run: |
          git merge upstream/master --no-edit

      - name: Push back to your fork
        run: |
          git push origin master
